function getWingFamily(wingStr) {
  if (!wingStr) return 'Other';
  var s = wingStr.toLowerCase();
  if (s.includes('surge')) return 'Surge';
  if (s.includes('fireball')) return 'Fireball';
  if (s.includes('spitfire')) return 'Spitfire';
  if (s.includes('art')) return 'ART';
  if (s.includes('png')) return 'PNG';
  return 'Other';
}

function getMarkerColor(m) {
  if (wingMode && currentFilter !== 'all') {
    var wing = m.wings && m.wings[currentFilter];
    var family = getWingFamily(wing);
    return WING_FAMILY_COLORS[family] || WING_FAMILY_COLORS['Other'];
  }
  if (wingMode) {
    // Use primary disc wing for color
    var primaryDisc = m.discs && m.discs[0];
    var wing = primaryDisc && m.wings[primaryDisc];
    var family = getWingFamily(wing);
    return WING_FAMILY_COLORS[family] || WING_FAMILY_COLORS['Other'];
  }
  return REGION_COLORS[m.region] || '#718096';
}

function buildPopup(m, filterDisc) {
  var discsHtml = '';
  if (m.discs && m.discs.length > 0) {
    m.discs.forEach(function(d) {
      var wing = m.wings && m.wings[d] ? m.wings[d] : '—';
      var highlighted = (filterDisc && filterDisc !== 'all' && d === filterDisc);
      discsHtml += '<div class="popup-disc">' +
        '<span class="popup-disc-name">' + (DISC_EMOJIS[d] || '🏄') + ' ' + d + '</span>' +
        '<span class="popup-disc-wing' + (highlighted ? ' highlighted' : '') + '">' + escapeHtml(wing) + '</span>' +
        '</div>';
    });
  }
  return '<div class="popup-location">📍 ' + escapeHtml(m.location) + '</div>' +
    '<div class="popup-meta">⚖️ ' + escapeHtml(m.weight) + ' · ' + escapeHtml(m.exp) + (m.age ? ' · ' + escapeHtml(m.age) : '') + '</div>' +
    discsHtml;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function createClusterGroup() {
  return L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    iconCreateFunction: function(cluster) {
      var count = cluster.getChildCount();
      var size = count < 10 ? 32 : count < 20 ? 38 : 44;
      return L.divIcon({
        html: '<div style="background:rgba(0,178,180,0.85);width:' + size + 'px;height:' + size + 'px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:' + (size < 38 ? 12 : 14) + 'px">' + count + '</div>',
        className: '',
        iconSize: [size, size],
        iconAnchor: [size/2, size/2]
      });
    }
  });
}

function renderMarkers() {

  var visibleCount = 0;
  MARKERS_DATA.forEach(function(m) {
    // Apply discipline filter
    if (currentFilter !== 'all' && (!m.discs || m.discs.indexOf(currentFilter) === -1)) {
      return;
    }
    
    var color = getMarkerColor(m);
    var cm = L.circleMarker([m.lat, m.lng], {
      radius: 7,
      fillColor: color,
      color: '#fff',
      weight: 1.5,
      opacity: 0.9,
      fillOpacity: 0.85
    });
    cm.bindPopup(buildPopup(m, currentFilter), { maxWidth: 300 });
    mcg.addLayer(cm);
    visibleCount++;
  });

  map.addLayer(mcg);
  updateSummaryPanel();
  updateSidebar();
}

function normalizeWing(raw) {
  if (!raw) return null;
  var s = raw.trim();
  if (!s) return null;
  // Split multi-wing entries on common separators
  var parts = s.split(/[,\+\/&]|(?:\band\b)|(?:\bor\b)|(?:\bet\b)/i);
  var results = [];
  parts.forEach(function(p) {
    p = p.trim().replace(/\s+/g, ' ');
    if (!p || p.length < 3) return;
    // Normalize known families
    var families = [
      {re: /(?:surge)\s*(\d{3,4})/i, fmt: function(m){return 'Surge '+m[1];}},
      {re: /(?:fireball|fb)\s*(\d{3,4})/i, fmt: function(m){return 'Fireball '+m[1];}},
      {re: /(?:spitfire|sf)\s*(\d{3,4})/i, fmt: function(m){return 'Spitfire '+m[1];}},
      {re: /(?:tempo)\s*(\d{3,4})/i, fmt: function(m){return 'Tempo '+m[1];}},
      {re: /(?:art\s*pro|artpro)\s*(\d{3,4})/i, fmt: function(m){return 'ART Pro '+m[1];}},
      {re: /(?:art\s*v2|artv2)\s*(\d{3,4})/i, fmt: function(m){return 'ART V2 '+m[1];}},
      {re: /(\d{3,4})\s*(?:art\s*v2|artv2)/i, fmt: function(m){return 'ART V2 '+m[1];}},
      {re: /(?:art)\s*(\d{3,4})\s*v2/i, fmt: function(m){return 'ART V2 '+m[1];}},
      {re: /(?:art)\s*(\d{3,4})\s*(?:v1)?/i, fmt: function(m){return 'ART '+m[1];}},
      {re: /(?:png)\s*(?:v2\s*)?(\d{3,4})/i, fmt: function(m){return 'PNG '+m[1];}},
      {re: /(?:bsc)\s*(\d{3,4})/i, fmt: function(m){return 'BSC '+m[1];}},
      {re: /(?:hps)\s*(\d{3,4})/i, fmt: function(m){return 'HPS '+m[1];}},
      {re: /(?:ha)\s+(\d{3,4})/i, fmt: function(m){return 'HA '+m[1];}},
    ];
    for (var i = 0; i < families.length; i++) {
      var match = p.match(families[i].re);
      if (match) { results.push(families[i].fmt(match)); return; }
    }
    // If just a number like "1401", keep as-is
    if (/^\d{3,4}$/.test(p.trim())) { results.push(p.trim()); return; }
    // Fallback: capitalize first letter
    results.push(p.charAt(0).toUpperCase() + p.slice(1));
  });
  return results.length > 0 ? results : null;
}

function updateSummaryPanel() {
  if (currentFilter === 'all') return;
  var wingCounts = {};
  var totalRiders = 0;
  MARKERS_DATA.forEach(function(m) {
    if (!m.discs || m.discs.indexOf(currentFilter) === -1) return;
    totalRiders++;
    var raw = m.wings && m.wings[currentFilter];
    var wings = normalizeWing(raw);
    if (!wings) {
      wingCounts['Not specified'] = (wingCounts['Not specified'] || 0) + 1;
      return;
    }
    wings.forEach(function(w) {
      wingCounts[w] = (wingCounts[w] || 0) + 1;
    });
  });
  var sorted = Object.entries(wingCounts).sort(function(a,b){return b[1]-a[1];}).slice(0, 12);
  var accounted = sorted.reduce(function(a,e){return a+e[1];}, 0);
  
  document.getElementById('summary-title').textContent = (DISC_EMOJIS[currentFilter] || '🏄') + ' ' + currentFilter + ' — Top Wings (' + totalRiders + ' riders)';
  var html = '';
  sorted.forEach(function(entry) {
    html += '<div class="summary-wing"><span>' + escapeHtml(entry[0]) + '</span><span class="cnt">' + entry[1] + '</span></div>';
  });
  html += '<div style="margin-top:0.4rem;color:#718096;font-size:0.72rem;">Top 12 shown · ' + accounted + ' mentions from ' + totalRiders + ' riders</div>';
  document.getElementById('summary-body').innerHTML = html;
}

    if (topDiscs.length > 0) {

    }
    
    html += '</div>';
  });
  
  document.getElementById('regional-content').innerHTML = html;
}

// Initial render
renderMarkers();
</script>
