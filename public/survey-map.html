// Create marker cluster group
var mcg = L.markerClusterGroup({
  maxClusterRadius: 40,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  iconCreateFunction: function(cluster) {
    var count = cluster.getChildCount();
    var size = count < 10 ? 32 : count < 20 ? 38 : 44;
    return L.divIcon({
      html: '<div style="background:rgba(0,178,180,0.85);width:' + size + 'px;height:' + size + 'px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:' + (size < 38 ? 12 : 14) + 'px">' + count + '</div>',
      className: '',
      iconSize: [size, size],
      iconAnchor: [size/2, size/2]
    });
  }
});

markers.forEach(function(m) {
  var circleMarker = L.circleMarker([m.lat, m.lng], {
    radius: 7,
    fillColor: m.color,
    color: '#fff',
    weight: 1.5,
    opacity: 0.9,
    fillOpacity: 0.85,
  });
  
  var popupHtml = '<div class="popup-location">📍 ' + m.location + '</div>' +
    '<div class="popup-detail">⚖️ ' + m.weight + ' · ' + m.exp + '</div>' +
    '<div class="popup-discs">🏄 ' + m.discs + '</div>';
  
  circleMarker.bindPopup(popupHtml, { maxWidth: 280 });
  mcg.addLayer(circleMarker);
});

map.addLayer(mcg);
